<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accueil</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:'Poppins', sans-serif;
    overflow:hidden;
}

/* fond très léger premium */
body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background: radial-gradient(circle, rgba(0,0,0,0.04), transparent 70%);
    top:-120px;
    left:-120px;
    filter: blur(30px);
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background: radial-gradient(circle, rgba(0,0,0,0.03), transparent 70%);
    bottom:-120px;
    right:-120px;
    filter: blur(30px);
}

/* TEXTE PREMIUM ATTIRANT */
h1{
    font-size:44px;
    font-weight:700;
    letter-spacing:4px;
    text-transform:uppercase;
    text-align:center;

    /* effet luxe */
    background: linear-gradient(90deg, #111827, #6b7280, #111827);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    /* glow doux */
    text-shadow: 0 5px 20px rgba(0,0,0,0.08);

    /* animation */
    animation: floatText 3s ease-in-out infinite;
}

/* animation flottante */
@keyframes floatText{
    0%{
        transform: translateY(0px);
    }
    50%{
        transform: translateY(-8px);
    }
    100%{
        transform: translateY(0px);
    }
}
</style>
</head>

<body>

<h1>BIENVENUE SUR MON SITE WEB</h1>

</body>
</html>
